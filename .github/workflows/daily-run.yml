name: Daily Run

# 每天 UTC 20:00 = PDT 13:00 / PST 12:00(见 brief §5 Week 1 周一)
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 需要 push commit(daily digest)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --frozen

      - name: Init DB (idempotent)
        run: uv run python -m src.storage.init_db

      # ========== Week 1 周一:仅空架子,以下步骤陆续启用 ==========
