      # - name: Extract skills
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: uv run python -m src.main extract
      #
      # - name: Normalize
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #   run: uv run python -m src.main normalize
      #
      # - name: Generate daily report
      #   run: uv run python -m src.reporter.daily
      # ============================================================

      - name: Smoke check
        run: |
          echo "✅ Daily run skeleton OK · $(date -u)"
          uv run ai-jobs version

